version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: healtharch
      POSTGRES_PASSWORD: healtharch
      POSTGRES_DB: healtharch
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healtharch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
